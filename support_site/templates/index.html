<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HelpDesk — Система заявок</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .ticket-card { border-left: 5px solid #0d6efd; transition: 0.3s; }
        .ticket-card:hover { transform: translateY(-3px); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-primary mb-4">
    <div class="container">
        <span class="navbar-brand mb-0 h1">IT-Поддержка 2.0</span>
    </div>
</nav>

<div class="container">
    <div class="row">
        <div class="col-md-4">
            <div class="card shadow-sm mb-4">
                <div class="card-body">
                    <h5 class="card-title mb-3">Создать заявку</h5>
                    <form action="/add" method="POST">
                        <div class="mb-3">
                            <label class="form-label">Ваше имя</label>
                            <input type="text" name="user_name" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Категория</label>
                            <select name="category" class="form-select">
                                <option>Железо</option>
                                <option>Программы</option>
                                <option>Сеть / Интернет</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Описание проблемы</label>
                            <textarea name="description" class="form-control" rows="3" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Отправить в IT</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <h4 class="mb-3">Текущие заявки</h4>
            {% for ticket in tickets %}
            <div class="card mb-3 ticket-card">
                <div class="card-body d-flex justify-content-between align-items-center">
                    <div>
                        <small class="text-muted">{{ ticket.created_at }} | ID: {{ ticket.id }}</small>
                        <h6 class="mt-1 mb-1"><strong>{{ ticket.user_name }}</strong> — {{ ticket.category }}</h6>
                        <p class="mb-0 text-secondary">{{ ticket.description }}</p>
                    </div>
                    <a href="/delete/{{ ticket.id }}" class="btn btn-outline-danger btn-sm">Закрыть</a>
                </div>
            </div>
            {% else %}
            <div class="alert alert-info">Пока заявок нет. Тишина — это хорошо!</div>
            {% endfor %}
        </div>
    </div>
</div>

</body>
</html>
